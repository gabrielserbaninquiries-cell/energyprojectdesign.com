## Render blueprint for Energy Project Design Services
## Auto-detected when repo is connected to Render dashboard.
## After connecting the repo, set the secret env vars in Render UI (MONGO_URL, JWT_SECRET, STRIPE_API_KEY, GMAIL_USER, GMAIL_APP_PASSWORD, OPENAI_API_KEY, GOOGLE_API_KEY, GOOGLE_CLIENT_ID, GITHUB_TOKEN, EPD_UPDATE_SECRET).

services:
  - type: web
    name: energy-project-design-services
    env: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DB_NAME
        value: energy_project_design
      - key: CORS_ORIGINS
        value: "*"
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_HOURS
        value: 168
      - key: EPD_AI_MODEL
        value: gpt-4o-mini
      - key: DEVELOPER_TEST_EMAIL
        value: dragosserban95@gmail.com
      - key: GITHUB_OWNER
        value: dragosserban95
      - key: GITHUB_REPO
        value: Energy-Project-Design
      - key: GITHUB_BRANCH
        value: main
      - key: SMTP_FROM_NAME
        value: Energy Project Design Services
      - key: TZ
        value: Europe/Bucharest
      # Secrets — fill in Render dashboard:
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: EPD_UPDATE_SECRET
        sync: false
      - key: DEVELOPER_TEST_PASSWORD
        sync: false

  - type: web
    name: energy-project-design-services-web
    env: static
    region: frankfurt
    rootDir: frontend
    buildCommand: yarn install --frozen-lockfile && yarn build
    staticPublishPath: ./build
    autoDeploy: true
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://energy-project-design-services.onrender.com
      - key: WDS_SOCKET_PORT
        value: 443
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
